services:
  - type: web
    name: gestion-comercial-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build --workspace backend
    startCommand: npm run prisma:deploy && npm run start --workspace backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-comercial-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: CORS_ORIGIN
        sync: false
      - key: APP_TIME_ZONE
        value: America/Argentina/Buenos_Aires

databases:
  - name: gestion-comercial-db
    plan: free
    postgresMajorVersion: '18'
    databaseName: gestion_comercial
    user: gestion_comercial_user
